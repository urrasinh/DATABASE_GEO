<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geoturismo Chile - Administración</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background-color: var(--bg-base); }
    </style>
</head>
<body>

    <!-- OVERLAY DE LOGIN -->
    <div id="login-overlay">
        <div class="login-box glass">
            <h2>Acceso Administrativo</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" class="form-control" placeholder="urrasinh@gmail.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" class="form-control" required disabled value="1GmourrA1"> <!-- auto-filled context user request -->
                </div>
                <button type="submit" class="btn-glass btn-primary btn-block">Ingresar al Panel</button>
            </form>
            <div id="login-error" style="color:#ef4444; margin-top:10px; font-size:0.85rem; text-align:center;"></div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div class="admin-layout" id="dashboard" style="display: none;">
        
        <!-- SIDEBAR -->
        <aside class="admin-sidebar">
            <div class="logo">
                <i class='bx bx-map-alt'></i> Admin<span>Geo</span>
            </div>
            <nav class="nav-links">
                <a href="#" class="active"><i class='bx bx-data'></i> Base de Datos</a>
                <a href="index.html" target="_blank"><i class='bx bx-link-external'></i> Ver Sitio Público</a>
                <a href="#" id="btn-logout" style="margin-top:auto;"><i class='bx bx-log-out'></i> Cerrar Sesión</a>
            </nav>
        </aside>

        <!-- CONTENT -->
        <main class="admin-content">
            <header class="admin-header">
                <div>
                    <h1>Gestión de Fichas (Lugares)</h1>
                    <p style="color:var(--text-muted); font-size:0.9rem;">Visualiza, edita o crea nuevos destinos turísticos.</p>
                </div>
                <button id="btn-create" class="btn-glass btn-primary">
                    <i class='bx bx-plus'></i> Nueva Ficha
                </button>
            </header>

            <!-- CONTROLES EXTRA (Buscador / Paginacion basica) -->
            <div style="margin-bottom:1rem; display:flex; justify-content:space-between; align-items:center; flex-wrap: wrap; gap: 1rem;">
                <div style="display:flex; gap: 0.5rem; flex-grow: 1;">
                    <input type="text" id="search-input" class="form-control" style="max-width:300px;" placeholder="Buscar por código o nombre...">
                    <select id="filter-region" class="custom-select" style="max-width:180px;">
                        <option value="">Todas las Regiones</option>
                    </select>
                    <select id="filter-categoria" class="custom-select" style="max-width:180px;">
                        <option value="">Todas las Categorías</option>
                    </select>
                    <select id="filter-jerarquia" class="custom-select" style="max-width:180px;">
                        <option value="">Todas las Jerarquías</option>
                    </select>
                </div>
                
                <div style="display: flex; align-items: center; gap: 1rem; flex-shrink: 0;">
                    <span id="total-fichas-count" style="color:var(--text-muted); font-size: 0.85rem;"></span>
                    <div class="pagination-controls" style="margin:0; padding:0;">
                        <button class="btn-glass btn-prev-page"><i class='bx bx-chevron-left'></i></button>
                        <span class="page-indicator" style="font-size:0.85rem; font-weight:600;">1</span>
                        <button class="btn-glass btn-next-page"><i class='bx bx-chevron-right'></i></button>
                    </div>
                </div>
            </div>

            <!-- TABLE -->
            <div class="data-table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th class="sortable" data-sort="codigo" style="cursor: pointer;">Código <i class='bx bx-sort'></i></th>
                            <th class="sortable" data-sort="nombre" style="cursor: pointer;">Nombre <i class='bx bx-sort'></i></th>
                            <th class="sortable" data-sort="region" style="cursor: pointer;">Región <i class='bx bx-sort'></i></th>
                            <th class="sortable" data-sort="categoria" style="cursor: pointer;">Categoría <i class='bx bx-sort'></i></th>
                            <th class="sortable" data-sort="jerarquia" style="cursor: pointer;">Jerarquía <i class='bx bx-sort'></i></th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Data rows here -->
                    </tbody>
                </table>
            </div>

            <!-- Bottom Pagination -->
            <div style="margin-top:1.5rem; display: flex; justify-content: flex-end; align-items: center; gap: 1rem;">
                <div class="pagination-controls" style="margin:0; padding:0;">
                    <button class="btn-glass btn-prev-page"><i class='bx bx-chevron-left'></i></button>
                    <span class="page-indicator" style="font-size:0.85rem; font-weight:600;">1</span>
                    <button class="btn-glass btn-next-page"><i class='bx bx-chevron-right'></i></button>
                </div>
            </div>
        </main>
    </div>

    <!-- MODAL DE EDICION / CREACION -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content glass">
            <div class="modal-header">
                <h2 id="modal-title">Nueva Ficha</h2>
                <button id="btn-close-modal" class="btn-icon"><i class='bx bx-x'></i></button>
            </div>
            
            <form id="ficha-form">
                <input type="hidden" id="f-id">
                
                <div class="form-grid">
                    <!-- Column 1 -->
                    <div>
                        <div class="form-group">
                            <label>Código</label>
                            <input type="text" id="f-codigo" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Nombre del Lugar</label>
                            <input type="text" id="f-nombre" class="form-control" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Región <small>(Ticket de selección)</small></label>
                            <input type="text" id="f-region" list="dl-region" class="form-control" placeholder="Escribe o selecciona..">
                            <datalist id="dl-region"></datalist>
                        </div>

                        <div class="form-group">
                            <label>Provincia</label>
                            <input type="text" id="f-provincia" list="dl-provincia" class="form-control">
                            <datalist id="dl-provincia"></datalist>
                        </div>

                        <div class="form-group">
                            <label>Comuna</label>
                            <input type="text" id="f-comuna" list="dl-comuna" class="form-control">
                            <datalist id="dl-comuna"></datalist>
                        </div>

                        <div class="form-group">
                            <label>Localidad</label>
                            <input type="text" id="f-localidad" list="dl-localidad" class="form-control">
                            <datalist id="dl-localidad"></datalist>
                        </div>
                        
                        <div class="form-group">
                            <label>Dirección Específica</label>
                            <input type="text" id="f-direccion" class="form-control">
                        </div>
                    </div>

                    <!-- Column 2 -->
                    <div>
                        <div class="form-group">
                            <label>Jerarquía</label>
                            <input type="text" id="f-jerarquia" list="dl-jerarquia" class="form-control">
                            <datalist id="dl-jerarquia"></datalist>
                        </div>
                        
                        <div class="form-group">
                            <label>Categoría</label>
                            <input type="text" id="f-categoria" list="dl-categoria" class="form-control">
                            <datalist id="dl-categoria"></datalist>
                        </div>

                        <div class="form-group">
                            <label>Tipo</label>
                            <input type="text" id="f-tipo" list="dl-tipo" class="form-control">
                            <datalist id="dl-tipo"></datalist>
                        </div>

                        <div class="form-group">
                            <label>Subtipo</label>
                            <input type="text" id="f-subtipo" list="dl-subtipo" class="form-control">
                            <datalist id="dl-subtipo"></datalist>
                        </div>
                        
                        <div class="form-group">
                            <label>Tipo de Propiedad</label>
                            <input type="text" id="f-tipo_propiedad" list="dl-tipo_propiedad" class="form-control">
                            <datalist id="dl-tipo_propiedad"></datalist>
                        </div>

                        <div class="form-group">
                            <label>Demanda Turística</label>
                            <input type="text" id="f-demanda_turistica" list="dl-demanda_turistica" class="form-control">
                            <datalist id="dl-demanda_turistica"></datalist>
                        </div>
                        
                        <div class="form-group">
                            <label>Estacionalidad</label>
                            <input type="text" id="f-estacionalidad" class="form-control">
                        </div>
                    </div>
                </div>

                <!-- Footer Full width -->
                <div class="form-grid full">
                    <div class="form-group">
                        <label>Dotación de Servicios</label>
                        <input type="text" id="f-dotacion_servicios" class="form-control" placeholder="Ej: Agua potable, Electricidad...">
                    </div>
                    <div class="form-group">
                        <label>Estado de Conservación</label>
                        <input type="text" id="f-conservacion" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Descripción Completa del Lugar</label>
                        <textarea id="f-descripcion" class="form-control" rows="4"></textarea>
                    </div>
                </div>

                <div class="modal-footer">
                    <div id="form-msg" style="font-size:0.85rem; padding-top:0.5rem; flex-grow:1;"></div>
                    <button type="button" class="btn-glass" id="btn-cancelar">Cancelar</button>
                    <button type="submit" class="btn-glass btn-primary" id="btn-guardar"><i class='bx bx-save'></i> Guardar Ficha</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/admin.js"></script>
</body>
</html>
