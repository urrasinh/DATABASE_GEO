<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geoturismo Chile - Ficha de Lugar</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="detail-page">
    <div class="bg-gradient"></div>
    <div class="bg-blur"></div>

    <nav class="navbar glass">
        <div class="logo">
            <i class='bx bx-map-alt'></i> Geoturismo <span>Lugares</span>
        </div>
        <div class="nav-links">
            <a href="index.html" class="active"><i class='bx bx-arrow-back'></i> Volver a Explorar</a>
        </div>
    </nav>

    <main class="container detail-container">
        <div id="loader" class="loading-spinner">
            <i class='bx bx-loader-alt bx-spin'></i> Cargando ficha...
        </div>

        <article class="ficha-card glass" id="ficha" style="display: none;">
            <!-- Hero Image dynamically injected -->
            <div class="ficha-cover" id="ficha-cover">
                <div class="badges">
                    <span class="badge category" id="badge-cat"></span>
                    <span class="badge type" id="badge-type"></span>
                </div>
            </div>

            <div class="ficha-content">
                <header class="ficha-header">
                    <h1 class="title" id="titulo"></h1>
                    <p class="subtitle" id="region-loc"><i class='bx bx-map'></i> <span></span></p>
                </header>
                
                <section class="ficha-body">
                    <div class="description-block" id="descripcion"></div>
                    
                    <div class="info-grid">
                        <div class="info-item">
                            <i class='bx bx-category'></i>
                            <div>
                                <small>Jerarquía</small>
                                <strong id="val-jerarquia"></strong>
                            </div>
                        </div>
                        <div class="info-item">
                            <i class='bx bx-buildings'></i>
                            <div>
                                <small>Tipo Propiedad</small>
                                <strong id="val-propiedad"></strong>
                            </div>
                        </div>
                        <div class="info-item">
                            <i class='bx bx-sun'></i>
                            <div>
                                <small>Estacionalidad</small>
                                <strong id="val-estacion"></strong>
                            </div>
                        </div>
                        <div class="info-item">
                            <i class='bx bx-group'></i>
                            <div>
                                <small>Demanda Turística</small>
                                <strong id="val-demanda"></strong>
                            </div>
                        </div>
                        <div class="info-item">
                            <i class='bx bx-water'></i>
                            <div>
                                <small>Servicios</small>
                                <strong id="val-servicios"></strong>
                            </div>
                        </div>
                        <div class="info-item">
                            <i class='bx bx-shield-alt-2'></i>
                            <div>
                                <small>Conservación</small>
                                <strong id="val-conservacion"></strong>
                            </div>
                        </div>
                        <div class="info-item">
                            <i class='bx bx-navigation'></i>
                            <div>
                                <small>Ubicación Específica</small>
                                <strong id="val-direccion"></strong>
                            </div>
                        </div>
                        <div class="info-item">
                            <i class='bx bx-hash'></i>
                            <div>
                                <small>Código</small>
                                <strong id="val-codigo"></strong>
                            </div>
                        </div>
                    </div>

                    <!-- Div for Google Maps -->
                    <div id="map-wrap" style="margin-top: 3rem; display: none;">
                        <h3 style="margin-bottom: 1rem; font-size: 1.2rem; color: var(--accent-color);"><i class='bx bx-map-pin'></i> Ubicación del Lugar</h3>
                        <div id="map-container" class="glass" style="height: 350px; width: 100%; border-radius: var(--radius-md); overflow: hidden; position: relative;">
                            <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--text-muted);">
                                Cargando mapa...
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </article>
        
        <div id="error-message" class="error-glass" style="display: none;">
            <i class='bx bx-error-circle'></i>
            <h2>Lugar no encontrado</h2>
            <p>Lo sentimos, no pudimos cargar los detalles de este lugar.</p>
            <a href="index.html" class="btn-glass">Regresar</a>
        </div>
    </main>

    <script src="js/lugar.js"></script>
</body>
</html>
